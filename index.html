<!DOCTYPE html>
<html>
<head>

<title>Aratasanのゲーム部屋</title>
<style>

  max-width: 600px;
  margin-top: 20px;
}

}

  background:#00eaff;
  border:none;

  border-radius:10px;

<p>ブレインロット交換チャレンジ！最弱から最強を目指す遊び！</p>

</div>

<div class="card">
<h2>🟩 Minecraft</h2>
<p>統合版RPG制作中！ゾンビ討伐ゲーム！</p>

</div>

<div class="card">
<h2>🎲 その他ゲーム</h2>
